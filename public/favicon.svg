<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with dark vintage feel -->
  <circle cx="32" cy="32" r="30" fill="#0B0B0B" stroke="#C4A96A" stroke-width="3"/>
  
  <!-- Inner ornamental ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#9A7B3C" stroke-width="1" stroke-dasharray="4 3"/>
  
  <!-- Question mark - the main symbol -->
  <text x="32" y="41" font-family="serif" font-size="36" font-weight="bold" fill="#D4AF37" text-anchor="middle" dominant-baseline="middle">?</text>
  
  <!-- Small decorative stars -->
  <text x="14" y="18" font-size="8" fill="#C4A96A" text-anchor="middle">✦</text>
  <text x="50" y="18" font-size="8" fill="#C4A96A" text-anchor="middle">✦</text>
  <text x="14" y="50" font-size="8" fill="#C4A96A" text-anchor="middle">✦</text>
  <text x="50" y="50" font-size="8" fill="#C4A96A" text-anchor="middle">✦</text>
</svg>