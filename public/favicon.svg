<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gold gradient for the shield border -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#9A7B3C"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1412"/>
      <stop offset="100%" stop-color="#0B0908"/>
    </linearGradient>
  </defs>

  <!-- Shield shape background -->
  <path d="M32 2 L58 14 L58 34 Q58 52 32 62 Q6 52 6 34 L6 14 Z"
        fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Inner ornamental border -->
  <path d="M32 7 L53 17 L53 33 Q53 48 32 57 Q11 48 11 33 L11 17 Z"
        fill="none" stroke="#9A7B3C" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- Skull -->
  <!-- Cranium -->
  <ellipse cx="32" cy="26" rx="12" ry="11" fill="#E8DCC8" opacity="0.95"/>
  <!-- Left eye socket -->
  <ellipse cx="27" cy="25" rx="3.5" ry="4" fill="#0B0908"/>
  <!-- Right eye socket -->
  <ellipse cx="37" cy="25" rx="3.5" ry="4" fill="#0B0908"/>
  <!-- Eye glow left -->
  <ellipse cx="27" cy="25" rx="1.8" ry="2" fill="#B34040" opacity="0.8"/>
  <!-- Eye glow right -->
  <ellipse cx="37" cy="25" rx="1.8" ry="2" fill="#B34040" opacity="0.8"/>
  <!-- Nose -->
  <path d="M30 30 L32 33 L34 30" fill="none" stroke="#0B0908" stroke-width="1.2"/>
  <!-- Jaw -->
  <path d="M22 32 Q24 38 32 39 Q40 38 42 32" fill="#DDD0BA" stroke="#0B0908" stroke-width="0.5"/>
  <!-- Teeth -->
  <line x1="26" y1="33" x2="26" y2="37" stroke="#0B0908" stroke-width="0.7"/>
  <line x1="29" y1="33" x2="29" y2="38" stroke="#0B0908" stroke-width="0.7"/>
  <line x1="32" y1="33" x2="32" y2="39" stroke="#0B0908" stroke-width="0.7"/>
  <line x1="35" y1="33" x2="35" y2="38" stroke="#0B0908" stroke-width="0.7"/>
  <line x1="38" y1="33" x2="38" y2="37" stroke="#0B0908" stroke-width="0.7"/>

  <!-- Question mark on forehead -->
  <text x="32" y="20" font-family="Georgia, serif" font-size="11" font-weight="bold"
        fill="#D4A843" text-anchor="middle" dominant-baseline="middle">?</text>

  <!-- Small decorative crosses -->
  <text x="15" y="14" font-size="6" fill="#C4A96A" text-anchor="middle" opacity="0.7">✦</text>
  <text x="49" y="14" font-size="6" fill="#C4A96A" text-anchor="middle" opacity="0.7">✦</text>

  <!-- Bottom banner ribbon -->
  <path d="M18 46 L46 46 L44 50 L46 54 L18 54 L20 50 Z" fill="#8B1A1A" stroke="#D4A843" stroke-width="0.8"/>
  <text x="32" y="51.5" font-family="Georgia, serif" font-size="5.5" font-weight="bold"
        fill="#F5D76E" text-anchor="middle" dominant-baseline="middle">FATE</text>
</svg>